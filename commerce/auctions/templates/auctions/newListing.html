{% extends "auctions/layout.html" %}

{% block title %} Create listing {% endblock %}

{% block body %}
    <h2>Create a New Listing</h2>

    {% if message %}
        <div class="alert alert-primary" role="alert" style="text-align: center;">
            {{ message }}
        </div>
    {% endif %}
    
    <form action="{% url 'newListing' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input class="form-control" autofocus type="text" type="text" name="title" placeholder="Listing title">
        </div>
        <div class="form-group">
            <label for="category">Select Category</label>
            <select class="form" name="category">
                {% for value, label in categories%}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            <input class="form-control" type="text" name="description" placeholder="Item description">
        </div>
        <div class="form-group">
            <input class="form-control" name="image_url" placeholder="Provide an url for the image (optional)">
        </div>
        <div class="form-group">
            <input class="form-control" type="number" name="initial_bid" placeholder="introduce an initial bid">
        </div>
        </div>
        <input class="btn btn-primary" type="submit" value="Create Bid">
    </form>
{% endblock %}
